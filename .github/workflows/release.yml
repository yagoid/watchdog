name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $name = "watchdog-${{ github.ref_name }}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target\release\watchdog.exe dist\
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE, CHANGELOG.md dist\
          Compress-Archive -Path dist\* -DestinationPath "$name.zip"
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
